{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đã đánh giá - Vexeapp</title>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static \'css/khachhang.css\' %}">
    <link rel="stylesheet" href="../CSS/CSS/danhgiachuyenxe.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-logo">
            <img src="{% static \'img/Vexeapp_logo.png\' %}" alt="Logo">
            <h1>Nhà xe Đà Nẵng - Huế</h1>
        </div>
        <div class="header-user" id="userDropdownBtn">
            <div class="user-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <i class="fa-solid fa-sort-down" style="margin-bottom: 6px;"></i>

            <div class="dropdown-menu" id="userMenu">
                <a href="{% url 'thongtin_khachhang' %}" class="dropdown-item">
                    <i class="fa-solid fa-gear"></i> Quản lý tài khoản
                </a>
                <a href="{% url 'dangxuat' %}" class="dropdown-item">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
                </a>
            </div>
        </div>
    </header>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="{% url 'khachhang' %}" class="sidebar-item">
                <i class="fa-solid fa-house"></i> Trang chủ
            </a>
            <a href="{% url 'timkiem' %}" class="sidebar-item">
                <i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm vé
            </a>
            <a href="{% url 'quanlyve' %}" class="sidebar-item">
                <i class="fa-solid fa-ticket"></i> Vé của tôi
            </a>
            <a href="{% url 'danhgiachuyenxe' %}" class="sidebar-item active">
                <i class="fa-solid fa-comments"></i> Đánh giá chuyến xe
            </a>
        </aside>

        <!-- Main Content -->
        <main class="main-content review-main">
            <div class="review-container">
                <div class="review-header-box">
                    <h2 class="review-title">Đánh giá chuyến xe</h2>
                    <div class="review-tabs">
                        <div class="review-tab" onclick="window.location.href='danhgiachuyenxe.html'">CHỜ ĐÁNH GIÁ</div>
                        <div class="review-tab active">ĐÃ ĐÁNH GIÁ</div>
                    </div>
                </div>

                <div class="evaluated-list" id="evaluatedList">
                    <!-- Reviews will be rendered here by JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <!-- The user explicitly mentioned keeping the footer here in all screens -->
    <footer class="footer-banner" style="margin-top:auto">
        <div>Địa chỉ: Trường Đại học Kinh Tế Đà Nẵng</div>
        <div>Liên hệ: Nhóm 07 - Lập trình web</div>
    </footer>

    <script src="../script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userBtn = document.getElementById('userDropdownBtn');
            const userMenu = document.getElementById('userMenu');

            if (userBtn && userMenu) {
                userBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    userMenu.classList.toggle('show');
                });

                document.addEventListener('click', () => {
                    userMenu.classList.remove('show');
                });
            }

            // Render evaluated list from localStorage
            const evaluatedListEl = document.getElementById('evaluatedList');

            const defaultReviews = [
                {
                    bus: "Khang Limousine",
                    stars: 5,
                    text: "Tài xế thân thiện, mình được đón tận nhà. Xe chạy đúng giờ. Ghế ngồi thoải mái",
                    date: "05/04/2026"
                },
                {
                    bus: "Khang Limousine",
                    stars: 5,
                    text: "Dịch vụ tốt, xe chạy êm, thái độ tài xế tốt",
                    date: "10/04/2026"
                }
            ];

            // Initialize localStorage if empty
            if (!localStorage.getItem('evaluatedReviews')) {
                localStorage.setItem('evaluatedReviews', JSON.stringify(defaultReviews));
            }

            const reviews = JSON.parse(localStorage.getItem('evaluatedReviews'));

            // Render functions
            function renderStars(rating) {
                let starsHtml = '';
                for (let i = 0; i < 5; i++) {
                    if (i < rating) {
                        starsHtml += '<i class="fa-solid fa-star"></i>';
                    } else {
                        starsHtml += '<i class="fa-solid fa-star" style="color:#ccc;"></i>';
                    }
                }
                return starsHtml;
            }

            function renderReviews() {
                evaluatedListEl.innerHTML = '';
                reviews.forEach(review => {
                    const card = document.createElement('div');
                    card.className = 'evaluated-card';
                    card.innerHTML = `
                        <div class="eval-card-header">
                            <img src="{% static \'img/Vexeapp_logo.png\' %}" class="eval-logo" alt="logo">
                            <div class="eval-bus-name">${review.bus}</div>
                        </div>
                        <div class="eval-stars">
                            ${renderStars(review.stars)}
                        </div>
                        <div class="eval-text">${review.text}</div>
                        <div class="eval-date">Ngày đi: ${review.date}</div>
                    `;
                    evaluatedListEl.appendChild(card);
                });
            }

            renderReviews();
        });
    </script>
</body>

</html>
