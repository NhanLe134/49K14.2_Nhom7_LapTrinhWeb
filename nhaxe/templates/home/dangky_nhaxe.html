{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản nhà xe</title>
    <link rel="stylesheet" href="{% static 'css/nhaxe_dangky_style.css' %}">
    <style>
        .input-error {
            border-color: red !important;
        }
    </style>
</head>

<body>

    <header class="nx-header">
        <a href="{% url 'index' %}" class="back-button">&lt;</a>
        <h1 class="nx-header-title">Đăng ký tài khoản nhà xe</h1>
    </header>

    <div class="registration-container">
        <main class="nx-main-content">
            <h2 class="form-title">Điền thông tin đăng ký</h2>

            <form id="formDangKyNhaXe">

                <div class="input-group">
                    <label for="tenNhaXe">Tên nhà xe</label>
                    <input type="text" id="tenNhaXe" name="tenNhaXe" placeholder="Nhập tên nhà xe">
                    <span class="error-text" id="err-tenNhaXe"></span>
                </div>

                <div class="input-group">
                    <label for="hotenDaiDien">Họ tên người đại diện</label>
                    <input type="text" id="hotenDaiDien" name="hotenDaiDien" placeholder="Nhập họ tên người đại diện">
                    <span class="error-text" id="err-hotenDaiDien"></span>
                </div>

                <div class="input-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập">
                    <span class="error-text" id="err-username"></span>
                </div>

                <div class="input-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu">
                    <span class="error-text" id="err-password"></span>
                </div>

                <div class="input-group">
                    <label for="rePassword">Nhập lại mật khẩu</label>
                    <input type="password" id="rePassword" name="rePassword" placeholder="Nhập lại mật khẩu đã tạo">
                    <span class="error-text" id="err-rePassword"></span>
                </div>

                <div class="input-group">
                    <label for="diaChiTruSo">Địa chỉ trụ sở</label>
                    <input type="text" id="diaChiTruSo" name="diaChiTruSo" placeholder="Nhập địa chỉ trụ sở">
                    <span class="error-text" id="err-diaChiTruSo"></span>
                </div>

                <div class="input-group input-file-wrapper">
                    <label for="hinhAnhDaiDien">Hình ảnh đại diện</label>
                    <div class="file-input-fake-container">
                        <input type="text" id="fileNameFake" placeholder="Chưa có tệp được chọn" readonly>
                        <button type="button" class="btn-chon-tep"
                            onclick="document.getElementById('hinhAnhDaiDien').click()">Chọn tệp</button>
                    </div>
                    <input type="file" id="hinhAnhDaiDien" name="hinhAnhDaiDien" accept="image/*" style="display:none;"
                        onchange="updateFileName()">
                    <span class="error-text" id="err-hinhAnhDaiDien"></span>
                </div>

                <div class="input-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="phone" placeholder="Nhập số điện thoại" maxlength="10">
                    <span class="error-text" id="err-phone"></span>
                </div>

                <div class="nx-footer">
                    <button type="button" class="btn-cancel">Hủy</button>
                    <button type="submit" class="btn-submit">Xác thực</button>
                </div>
            </form>
        </main>
    </div>

    <div id="otpModal" class="modal-overlay">
        <div class="otp-container">
            <div class="otp-header">
                <button type="button" class="btn-close-otp">
                    <span class="close-icon-x">&times;</span>
                </button>
            </div>
            <div class="otp-content">
                <h3 class="otp-title">Nhập mã OTP</h3>

                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                    <input type="text" maxlength="1" class="otp-box">
                </div>

                <span class="error-text otp-error-msg" id="err-otp"></span>

                <div class="otp-actions">
                    <button type="button" class="btn-resend" id="btnResendOtp">Gửi lại mã</button>
                    <button type="button" class="btn-complete">Hoàn thành</button>
                </div>
            </div>
        </div>
    </div>
    <div id="confirmModal" class="modal-overlay">
        <div class="alert-modal-container">
            <h3 class="alert-title">Thông báo</h3>
            <p class="alert-message">Bạn chắc chắn muốn hủy đăng ký tài khoản?</p>
            <div class="alert-actions">
                <button type="button" class="btn-outline" id="btnKhongHuy">Không</button>
                <button type="button" class="btn-fill" id="btnDongYHuy">Đồng ý</button>
            </div>
        </div>
    </div>

    <div id="errorModal" class="modal-overlay">
        <div class="alert-modal-container">
            <div class="alert-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff0000" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
            <p class="alert-message" id="errorMessageText" style="margin-bottom: 0;">Hệ thống lỗi, vui lòng thử lại sau!</p>
        </div>
    </div>

    <div id="successModal" class="modal-overlay">
        <div class="alert-modal-container">
            <div class="alert-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00c853" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <p class="alert-message" id="successMessageText" style="margin-bottom: 0;">Tạo tài khoản nhà xe thành công</p>
        </div>
    </div>
    <script>
        const URL_INDEX = "{% url 'index' %}";
        const URL_SEND_OTP = "{% url 'send_registration_otp_nhaxe' %}";
        const URL_VERIFY = "{% url 'verify_and_register_nhaxe' %}";
        const CSRF_TOKEN = "{{ csrf_token }}";
        let resendTimer;
        const RESEND_COOLDOWN = 60;

        document.addEventListener('DOMContentLoaded', () => {
            const formInputs = Array.from(document.querySelectorAll('#formDangKyNhaXe input'));
            formInputs.forEach((input, index) => {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const nextInput = formInputs[index + 1];
                        if (nextInput && nextInput.type !== 'file' && nextInput.style.display !== 'none') {
                            nextInput.focus();
                        } else {
                            document.querySelector('.btn-submit').focus();
                        }
                    }
                });
            });
        });

        function updateFileName() {
            var fileInput = document.getElementById('hinhAnhDaiDien');
            var fileNameDisplay = document.getElementById('fileNameFake');
            if (fileInput.files.length > 0) {
                fileNameDisplay.value = fileInput.files[0].name;
                fileNameDisplay.classList.add('has-file');
            } else {
                fileNameDisplay.value = "Chưa có tệp được chọn";
                fileNameDisplay.classList.remove('has-file');
            }
        }

        function displayFieldError(fieldId, message) {
            const errorSpan = document.getElementById(`err-${fieldId}`);
            const input = document.getElementById(fieldId);
            if (message) {
                errorSpan.textContent = `* ${message}`;
                errorSpan.classList.add('show-error');
                input.classList.add('input-error');
            } else {
                errorSpan.textContent = '';
                errorSpan.classList.remove('show-error');
                input.classList.remove('input-error');
            }
        }

        function getFormData() {
            return {
                tenNhaXe: document.getElementById('tenNhaXe').value,
                hotenDaiDien: document.getElementById('hotenDaiDien').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                diaChiTruSo: document.getElementById('diaChiTruSo').value,
                phone: document.getElementById('phone').value,
            };
        }

        document.getElementById('formDangKyNhaXe').addEventListener('submit', function (event) {
            event.preventDefault();
            let isValid = true;

            function checkEmpty(inputId, errorMsgName) {
                const input = document.getElementById(inputId);
                let valid = true;
                if (input.value.trim() === '') {
                    displayFieldError(inputId, `Vui lòng nhập ${errorMsgName}`);
                    valid = false;
                } else {
                    displayFieldError(inputId, '');
                }
                return valid;
            }

            const isTenValid = checkEmpty('tenNhaXe', 'tên nhà xe');
            const isHoTenValid = checkEmpty('hotenDaiDien', 'họ tên người đại diện');
            const isUserValid = checkEmpty('username', 'tên đăng nhập');
            const isPassValid = checkEmpty('password', 'mật khẩu');
            const isRePassValid = checkEmpty('rePassword', 'lại mật khẩu');
            const isDiaChiValid = checkEmpty('diaChiTruSo', 'địa chỉ trụ sở');
            const isPhoneValid = checkEmpty('phone', 'số điện thoại');

            const passInput = document.getElementById('password');
            const rePassInput = document.getElementById('rePassword');

            if (isPassValid) {
                const strongPasswordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;
                if (!strongPasswordRegex.test(passInput.value)) {
                    displayFieldError('password', 'Mật khẩu phải từ 8 ký tự, gồm chữ hoa, thường, số và ký tự đặc biệt');
                    isValid = false;
                }
            }

            if (isRePassValid && passInput.value !== rePassInput.value) {
                displayFieldError('rePassword', 'Mật khẩu nhập lại không khớp');
                isValid = false;
            }

            if (!isTenValid || !isHoTenValid || !isUserValid || !isDiaChiValid || !isPhoneValid || !isPassValid || !isRePassValid) {
                isValid = false;
            }

            if (isValid) {
                fetch(URL_SEND_OTP, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
                    body: JSON.stringify(getFormData()),
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        document.getElementById('otpModal').classList.add('show-modal');
                        startResendTimer();
                        document.querySelector('.otp-box').focus();
                    } else {
                        const errorMap = {
                            'Tên đăng nhập đã tồn tại.': 'username',
                            'Số điện thoại đã được sử dụng.': 'phone',
                            'Mật khẩu phải có ít nhất 8 ký tự.': 'password',
                        };
                        const fieldId = errorMap[data.message];
                        if (fieldId) {
                            displayFieldError(fieldId, data.message);
                        } else {
                            showError(data.message || 'Lỗi không xác định.');
                        }
                    }
                })
                .catch(() => showError('Lỗi kết nối. Vui lòng thử lại.'));
            }
        });

        document.querySelector('.btn-close-otp').addEventListener('click', function () {
            document.getElementById('otpModal').classList.remove('show-modal');
            clearInterval(resendTimer);
        });

        const otpBoxes = document.querySelectorAll('.otp-box');
        otpBoxes.forEach((box, index) => {
            box.addEventListener('input', function () {
                if (this.value.length === 1 && index < otpBoxes.length - 1) {
                    otpBoxes[index + 1].focus();
                }
            });
            box.addEventListener('keydown', function (e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    otpBoxes[index - 1].focus();
                }
            });
        });

        document.querySelector('.btn-cancel').addEventListener('click', function () {
            document.getElementById('confirmModal').classList.add('show-modal');
        });

        document.getElementById('btnKhongHuy').addEventListener('click', function () {
            document.getElementById('confirmModal').classList.remove('show-modal');
        });

        document.getElementById('btnDongYHuy').addEventListener('click', function () {
            window.location.href = URL_INDEX;
        });

        document.querySelector('.btn-complete').addEventListener('click', function () {
            let otpValue = "";
            document.querySelectorAll('.otp-box').forEach(box => { otpValue += box.value; });
            const otpErrorSpan = document.getElementById('err-otp');

            if (!otpValue.trim()) {
                otpErrorSpan.textContent = '* Vui lòng nhập mã OTP.';
                otpErrorSpan.style.display = 'block';
                return;
            }
            if (otpValue.length < 6) {
                otpErrorSpan.textContent = '* Vui lòng nhập đủ 6 số OTP.';
                otpErrorSpan.style.display = 'block';
                return;
            }
            otpErrorSpan.textContent = '';
            otpErrorSpan.style.display = 'none';

            fetch(URL_VERIFY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
                body: JSON.stringify({ otp: otpValue }),
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('otpModal').classList.remove('show-modal');
                    clearInterval(resendTimer);
                    document.getElementById('successMessageText').textContent = data.message;
                    document.getElementById('successModal').classList.add('show-modal');
                    setTimeout(function () {
                        window.location.href = URL_INDEX;
                    }, 2000);
                } else {
                    otpErrorSpan.textContent = `* ${data.message}` || '* Lỗi không xác định.';
                    otpErrorSpan.style.display = 'block';
                }
            })
            .catch(() => {
                otpErrorSpan.textContent = '* Lỗi hệ thống. Vui lòng thử lại sau!';
                otpErrorSpan.style.display = 'block';
            });
        });

        document.getElementById('btnResendOtp').addEventListener('click', function() {
            if (this.disabled) return;
            fetch(URL_SEND_OTP, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
                body: JSON.stringify(getFormData()),
            }).then(res => res.json()).then(data => {
                if (data.status === 'success') {
                    startResendTimer();
                    document.getElementById('err-otp').textContent = '';
                    document.getElementById('err-otp').style.display = 'none';
                } else {
                    document.getElementById('err-otp').textContent = `* ${data.message}`;
                    document.getElementById('err-otp').style.display = 'block';
                }
            });
        });

        function startResendTimer() {
            const btnResend = document.getElementById('btnResendOtp');
            let timeLeft = RESEND_COOLDOWN;
            btnResend.disabled = true;
            btnResend.style.opacity = '0.5';
            btnResend.style.cursor = 'not-allowed';

            clearInterval(resendTimer);
            resendTimer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(resendTimer);
                    btnResend.disabled = false;
                    btnResend.style.opacity = '1';
                    btnResend.style.cursor = 'pointer';
                    btnResend.textContent = 'Gửi lại mã';
                } else {
                    btnResend.textContent = `Gửi lại mã (${timeLeft}s)`;
                    timeLeft--;
                }
            }, 1000);
        }

        function showError(msg) {
            if(msg) document.getElementById('errorMessageText').textContent = msg;
            document.getElementById('errorModal').classList.add('show-modal');
            setTimeout(function () {
                document.getElementById('errorModal').classList.remove('show-modal');
            }, 3000);
        }
    </script>

    <script src="{% static 'js/common.js' %}"></script>
</body>

</html>
