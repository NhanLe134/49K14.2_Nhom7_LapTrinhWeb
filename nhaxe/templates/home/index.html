{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Vexeapp</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* Thông báo lỗi từ Django messages */
        .django-messages {
            list-style: none;
            padding: 0;
            margin: 0 0 16px 0;
        }
        .django-messages li {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 6px;
        }
        .django-messages .msg-error {
            background: #ffe4e4;
            color: #c0392b;
            border: 1px solid #f5c6c6;
        }
        .django-messages .msg-success {
            background: #e4ffe8;
            color: #1e8449;
            border: 1px solid #c6f5cc;
        }
    </style>
</head>

<body>
    <div class="main-content">
        <div class="logo-container">
            <img src="{% static 'img/Vexeapp_logo.png' %}" alt="Logo Vexeapp" id="logo-img">
        </div>

        <div class="login-form">

            {% if messages %}
            <ul class="django-messages">
                {% for msg in messages %}
                <li class="msg-{{ msg.tags }}">{{ msg }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <form id="loginForm" method="POST" action="{% url 'dangnhap' %}" novalidate>
                {% csrf_token %}

                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" required
                               value="{{ username_value|default:'' }}">
                        <span class="custom-placeholder" id="user-placeholder">Tên đăng nhập <span
                                class="required-star">*</span></span>
                    </div>
                    <div class="input-error" id="username-error"></div>
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" required>
                        <span class="custom-placeholder" id="pass-placeholder">Mật khẩu <span
                                class="required-star">*</span></span>
                    </div>
                    <div class="input-error" id="password-error"></div>
                </div>

                <div class="form-actions">
                    <a href="{% url 'dangky_khachhang' %}">Đăng ký Khách hàng</a>
                    <a href="{% url 'dangky_nhaxe' %}">Đăng ký Nhà xe</a>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-login">Đăng nhập</button>
                </div>

                <div class="forgot-pass">
                    <a href="{% url 'quen_mat_khau' %}">Quên mật khẩu?</a>
                </div>
            </form>
        </div>
    </div>

    <div class="footer">
        KẾT NỐI HÀNH TRÌNH DI SẢN
    </div>

    <script src="{% static 'js/script.js' %}?v=4"></script>
</body>

</html>
